name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.127.130.194
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/pg-accountant
            git pull origin master
            systemctl restart pg-accountant
            echo "Backend deployed: $(git log --oneline -1)"

  deploy-pwa:
    name: Deploy PWA (if web/ changed)
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout to check changed files
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if web/ changed
        id: web_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^web/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: SSH deploy PWA
        if: steps.web_changed.outputs.changed == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.127.130.194
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/pg-accountant/web
            npm run build
            systemctl restart kozzy-pwa
            echo "PWA deployed"
