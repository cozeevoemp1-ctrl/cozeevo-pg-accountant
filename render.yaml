services:
  - type: web
    name: cozeevo-pg-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: ADMIN_PHONE
        sync: false
      - key: POWER_USER_PHONES
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        value: "1037434219449187"
      - key: WHATSAPP_VERIFY_TOKEN
        value: "pg-accountant-verify"
      - key: LLM_PROVIDER
        value: "ollama"
      - key: PG_BUSINESS_NAME
        value: "Cozeevo"
      - key: PG_OWNER_NAME
        value: "Kiran"
      - key: LOG_LEVEL
        value: "INFO"
    healthCheckPath: /healthz
