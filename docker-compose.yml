version: "3.9"

# ── Local Development Setup ─────────────────────────────────
#
# This file runs n8n only.
# FastAPI runs directly on your machine (not in Docker).
#
# Usage:
#   Start:  docker-compose up -d
#   Stop:   docker-compose down
#   Logs:   docker-compose logs -f n8n
#
# After starting:
#   n8n dashboard:    http://localhost:5678  (admin / pgaccountant2024)
#   FastAPI (direct): http://localhost:8000  (run START_API.bat separately)
#
# n8n Variable to set in Settings → Variables:
#   FASTAPI_URL = http://host.docker.internal:8000
#   (host.docker.internal resolves to your laptop from inside Docker)

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: pg_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=pgaccountant2024
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=Asia/Kolkata
      # Allows n8n to call host machine (FastAPI on localhost:8000)
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux compatibility
    networks:
      - pg_network

volumes:
  n8n_data:

networks:
  pg_network:
    driver: bridge
