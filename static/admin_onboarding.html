<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozeevo — Onboarding Admin</title>
  <style>
    :root {
      --pink: #EF1F9C;
      --pink-dark: #c9167e;
      --blue: #00AEED;
      --bg: #F9FAFB;
      --card: #FFFFFF;
      --text: #2D3748;
      --sub: #718096;
      --muted: #A0AEC0;
      --border: #E2E8F0;
      --green: #38A169;
      --green-dark: #2F855A;
      --red: #E53E3E;
      --red-light: #FFF5F5;
      --red-border: #FC8181;
      --green-light: #F0FFF4;
      --green-border: #9AE6B4;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    header img { height: 32px; width: auto; }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    header h1 span { color: var(--pink); }

    /* ── Layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .card-body { padding: 20px; }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    input[type="text"],
    input[type="number"],
    input[type="tel"],
    input[type="date"],
    select,
    textarea {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    /* Hide the up/down spinner on number inputs — user types the amount */
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(239,31,156,.1);
    }
    textarea { resize: vertical; min-height: 72px; }
    input.error { border-color: var(--red); }

    /* Radio group */
    .radio-group {
      display: flex;
      gap: 12px;
      padding: 4px 0;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      cursor: pointer;
    }
    .radio-group input[type="radio"] {
      width: auto;
      accent-color: var(--pink);
      cursor: pointer;
    }

    /* Payment mode field */
    #payment-mode-field { display: none; }

    /* ── Buttons ── */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, opacity .15s, transform .1s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .btn-pink { background: var(--pink); color: #fff; }
    .btn-pink:hover:not(:disabled) { background: var(--pink-dark); }

    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover:not(:disabled) { background: var(--green-dark); }

    .btn-outline-red {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red-border);
    }
    .btn-outline-red:hover:not(:disabled) { background: var(--red-light); }

    .btn-ghost {
      background: var(--bg);
      color: var(--sub);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--border); }

    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-full { width: 100%; justify-content: center; margin-top: 4px; }

    /* ── Alerts / banners ── */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: var(--red-light); border: 1px solid var(--red-border); color: #c53030; }
    .alert-success { background: var(--green-light); border: 1px solid var(--green-border); color: #276749; }

    /* ── Result card (after create) ── */
    #create-result {
      margin-top: 16px;
      display: none;
    }
    #create-result.show { display: block; }
    .result-card {
      background: linear-gradient(135deg, #FFF0F9, #FFF);
      border: 1px solid #F9A8D4;
      border-radius: 10px;
      padding: 16px;
    }
    .result-card .label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--sub);
      margin-bottom: 4px;
    }
    .result-room {
      font-size: 16px;
      font-weight: 800;
      color: var(--pink);
      margin-bottom: 12px;
    }
    .link-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      color: var(--blue);
      margin-bottom: 10px;
    }
    .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Pending section ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 11px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-pink { background: var(--pink); color: #fff; }
    .badge-blue { background: var(--blue); color: #fff; }
    .badge-gray { background: var(--border); color: var(--sub); }

    /* ── Session items ── */
    .session-list { display: flex; flex-direction: column; gap: 12px; }
    .session-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .session-summary {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background .1s;
      user-select: none;
    }
    .session-summary:hover { background: var(--bg); }
    .session-avatar {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      background: linear-gradient(135deg, #EF1F9C22, #00AEED22);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--pink);
      flex-shrink: 0;
    }
    .session-info { flex: 1; min-width: 0; }
    .session-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 12px;
      color: var(--sub);
      margin-top: 2px;
    }
    .session-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .status-pill {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-pending-tenant { background: #FFF3CD; color: #856404; border: 1px solid #FCEAA3; }
    .status-pending-review { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }
    .session-date { font-size: 11px; color: var(--muted); }
    .chevron { transition: transform .2s; color: var(--muted); font-size: 12px; }
    .session-item.open .chevron { transform: rotate(180deg); }

    /* Session detail */
    .session-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px;
      background: var(--bg);
    }
    .session-item.open .session-detail { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .detail-field { display: flex; flex-direction: column; gap: 2px; }
    .detail-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--muted);
    }
    .detail-value { font-size: 13px; color: var(--text); font-weight: 500; }

    .section-divider {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--sub);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin: 14px 0 10px;
    }

    .sig-preview {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      margin-bottom: 14px;
    }
    .sig-preview img {
      max-width: 100%;
      max-height: 120px;
      display: block;
      border-radius: 4px;
    }
    .sig-missing {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }

    .detail-actions { display: flex; gap: 8px; }
    .inline-alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 10px;
      display: none;
    }
    .inline-alert.show { display: block; }
    .inline-alert-error { background: var(--red-light); border: 1px solid var(--red-border); color: #c53030; }
    .inline-alert-success { background: var(--green-light); border: 1px solid var(--green-border); color: #276749; }

    /* ── Loading / empty states ── */
    .loading-state {
      padding: 32px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; }

    /* ── Room info chips ── */
    .chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .chip {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--sub);
    }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: auto; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <img src="/static/logo.svg" alt="Cozeevo" onerror="this.style.display='none'">
  <h1>Onboarding <span>Management</span></h1>
</header>

<main>

  <!-- ── Section 1: Create Session (LEFT) ── -->
  <section id="create-section">
    <div class="card">
      <div class="card-header">
        <h2>Create New Session</h2>
      </div>
      <div class="card-body">
        <form id="create-form" autocomplete="off">
          <div class="form-grid">

            <div class="form-group">
              <label for="room_number">Room Number <span style="color:var(--muted);font-weight:400;">(optional)</span></label>
              <input type="text" id="room_number" name="room_number" placeholder="e.g. 101 (or leave blank to assign later)">
              <div id="room-info" style="font-size:11px;margin-top:4px;color:var(--muted);min-height:16px;"></div>
            </div>

            <div class="form-group">
              <label for="sharing_type">Sharing Type</label>
              <select id="sharing_type" name="sharing_type">
                <option value="single">Single</option>
                <option value="double" selected>Double</option>
                <option value="triple">Triple</option>
                <option value="premium">Premium</option>
              </select>
              <div id="sharing-warning" style="font-size:11px;margin-top:4px;color:#E53E3E;min-height:16px;"></div>
            </div>

            <div class="form-group">
              <label for="tenant_phone">Tenant Phone</label>
              <input type="tel" id="tenant_phone" name="tenant_phone" placeholder="10 digits" maxlength="10" required>
            </div>

            <div class="form-group">
              <label for="created_by_phone">Your Phone (for notifications)</label>
              <input type="tel" id="created_by_phone" name="created_by_phone" placeholder="10 digits" maxlength="10" value="8548884455">
            </div>

            <div class="form-group">
              <label for="agreed_rent">Agreed Rent (₹)</label>
              <input type="number" id="agreed_rent" name="agreed_rent" placeholder="0" min="0" required>
            </div>

            <div class="form-group">
              <label for="security_deposit">Security Deposit (₹)</label>
              <input type="number" id="security_deposit" name="security_deposit" placeholder="0" min="0">
            </div>

            <div class="form-group">
              <label for="maintenance_fee">Maintenance Fee (₹)</label>
              <input type="number" id="maintenance_fee" name="maintenance_fee" placeholder="0" min="0">
            </div>

            <div class="form-group">
              <label for="booking_amount">Booking Amount (₹)</label>
              <input type="number" id="booking_amount" name="booking_amount" placeholder="0" min="0">
            </div>

            <div class="form-group full" id="payment-mode-field">
              <label>Payment Mode</label>
              <div class="radio-group">
                <label><input type="radio" name="advance_mode" value="cash"> Cash</label>
                <label><input type="radio" name="advance_mode" value="upi"> UPI</label>
              </div>
            </div>

            <div class="form-group">
              <label for="checkin_date">Check-in Date</label>
              <input type="date" id="checkin_date" name="checkin_date" required>
            </div>

            <div class="form-group">
              <label for="stay_type">Stay Type</label>
              <select id="stay_type" name="stay_type">
                <option value="monthly">Monthly</option>
                <option value="daily">Daily</option>
              </select>
            </div>

            <!-- Monthly-only fields -->
            <div class="form-group monthly-field">
              <label for="lock_in_months">Lock-in Months</label>
              <input type="number" id="lock_in_months" name="lock_in_months" min="0" value="0">
            </div>

            <!-- Daily-only fields -->
            <div class="form-group daily-field" style="display:none;">
              <label for="checkout_date">Check-out Date</label>
              <input type="date" id="checkout_date" name="checkout_date">
            </div>
            <div class="form-group daily-field" style="display:none;">
              <label for="num_days">Number of Days</label>
              <input type="number" id="num_days" name="num_days" min="1" value="1">
            </div>
            <div class="form-group daily-field" style="display:none;">
              <label for="daily_rate">Daily Rate (₹)</label>
              <input type="number" id="daily_rate" name="daily_rate" min="0" placeholder="0">
            </div>

            <div class="form-group full">
              <label for="special_terms">Special Terms</label>
              <textarea id="special_terms" name="special_terms" placeholder="Any special terms or notes..."></textarea>
            </div>

          </div>

          <!-- Dues calculator -->
          <div id="dues-box" style="margin-top:16px;padding:12px 16px;background:linear-gradient(135deg,#FFF5F9,#F0FAFF);border-radius:10px;border:1px solid #E8ECF0;">
            <div style="font-weight:700;font-size:13px;color:var(--dark);margin-bottom:8px;">Amount Due at Check-in</div>
            <div id="dues-breakdown" style="font-size:12px;color:var(--muted);line-height:1.8;"></div>
            <div style="margin-top:6px;padding-top:6px;border-top:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center;">
              <span style="font-weight:700;font-size:14px;color:var(--dark);">Total Due</span>
              <span id="dues-total" style="font-weight:800;font-size:18px;color:var(--pink);">₹0</span>
            </div>
          </div>

          <div id="create-error" class="alert alert-error"></div>

          <button type="submit" class="btn btn-pink btn-full" id="create-btn" style="margin-top:16px;">
            Create &amp; Generate Link
          </button>
        </form>

        <!-- Result -->
        <div id="create-result">
          <div class="result-card">
            <div class="label">Session Created</div>
            <div id="result-room" class="result-room"></div>
            <div id="result-chips" class="chip-row"></div>
            <div class="label" style="margin-bottom:6px;">Onboarding Link</div>
            <div class="link-box" id="result-link"></div>
            <div class="result-actions">
              <button class="btn btn-ghost btn-sm" onclick="copyLink()">Copy Link</button>
              <button class="btn btn-ghost btn-sm" onclick="openWhatsApp()">Share via WhatsApp</button>
              <button class="btn btn-ghost btn-sm" onclick="resetForm()">New Session</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ── Section 2: Pending Reviews ── -->
  <section id="review-section">
    <div class="card">
      <div class="card-header">
        <h2>Pending Reviews</h2>
        <div style="display:flex;align-items:center;gap:8px;">
          <span id="pending-badge" class="badge badge-gray">0</span>
          <button class="btn btn-ghost btn-sm" onclick="loadPending();loadHistory()">Refresh</button>
        </div>
      </div>
      <div class="card-body" style="padding:0;">
        <div id="pending-container">
          <div class="loading-state">
            <span class="spinner"></span> Loading sessions...
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Section 3: All Sessions (filterable, expandable, full width) ── -->
  <section id="history-section" style="grid-column: 1 / -1;">
    <div class="card">
      <div class="card-header">
        <h2>All Sessions</h2>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <select id="filter-status" onchange="loadHistory()" style="padding:4px 8px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;">
            <option value="">All Status</option>
            <option value="approved">Approved</option>
            <option value="pending_review">Pending Review</option>
            <option value="pending_tenant">Awaiting Tenant</option>
            <option value="cancelled">Cancelled</option>
            <option value="expired">Expired (not filled)</option>
            <option value="superseded">Superseded (replaced)</option>
          </select>
          <input type="date" id="filter-date-from" onchange="loadHistory()" style="padding:4px 8px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;">
          <input type="date" id="filter-date-to" onchange="loadHistory()" style="padding:4px 8px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;">
          <span id="history-count" style="font-size:12px;color:var(--muted);"></span>
        </div>
      </div>
      <div class="card-body" style="padding:0;max-height:500px;overflow-y:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead>
            <tr style="background:#F7FAFC;position:sticky;top:0;z-index:1;">
              <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid #E8ECF0;width:24px;"></th>
              <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid #E8ECF0;">Name</th>
              <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid #E8ECF0;">Room</th>
              <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid #E8ECF0;">Phone</th>
              <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid #E8ECF0;">Rent</th>
              <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid #E8ECF0;">Form Status</th>
              <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid #E8ECF0;">Check-in</th>
              <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid #E8ECF0;">Created</th>
              <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid #E8ECF0;">Approved by</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let currentLink = '';
  let currentPhone = '';

  // ── Admin PIN ──────────────────────────────────────────────────────────────
  const ADMIN_PIN = new URLSearchParams(window.location.search).get('pin') || prompt('Enter admin PIN:') || '';
  if (!ADMIN_PIN) document.body.innerHTML = '<h2 style="padding:40px;color:#E53E3E;">Access denied. PIN required.</h2>';

  function pinHeaders(extra = {}) {
    return { 'X-Admin-Pin': ADMIN_PIN, ...extra };
  }
  function pinUrl(url) {
    return url + (url.includes('?') ? '&' : '?') + 'pin=' + encodeURIComponent(ADMIN_PIN);
  }

  // ── On load ────────────────────────────────────────────────────────────────
  const statusColors = { approved: '#166534', pending_review: '#92400E', pending_tenant: '#1E40AF', cancelled: '#991B1B', expired: '#6B7280', draft: '#6B7280' };
  const statusBg    = { approved: '#DCFCE7', pending_review: '#FEF3C7', pending_tenant: '#DBEAFE', cancelled: '#FEE2E2', expired: '#F3F4F6', draft: '#F3F4F6' };
  const statusLabel = { approved: 'Approved', pending_review: 'Pending Review', pending_tenant: 'Awaiting Tenant', cancelled: 'Cancelled', expired: 'Expired (not filled)', draft: 'Draft' };

  async function loadHistory() {
    const status = document.getElementById('filter-status').value;
    const from = document.getElementById('filter-date-from').value;
    const to = document.getElementById('filter-date-to').value;
    const params = new URLSearchParams();
    if (status) params.set('status', status);
    if (from) params.set('date_from', from);
    if (to) params.set('date_to', to);
    try {
      const res = await fetch(`/api/onboarding/admin/all?${params}`, { headers: pinHeaders() });
      if (!res.ok) return;
      const d = await res.json();
      const body = document.getElementById('history-body');
      document.getElementById('history-count').textContent = `${d.sessions.length} sessions`;
      if (!d.sessions.length) {
        body.innerHTML = '<tr><td colspan="9" style="padding:16px;text-align:center;color:var(--muted);">No sessions found</td></tr>';
        return;
      }
      // Build rows — each data row + a hidden expand row below it
      const checkinColors = { active: '#166534', no_show: '#92400E', exited: '#6B7280', cancelled: '#991B1B' };
      const checkinBg     = { active: '#DCFCE7', no_show: '#FEF3C7', exited: '#F3F4F6', cancelled: '#FEE2E2' };
      const checkinLabel  = { active: 'Checked In', no_show: 'No Show', exited: 'Checked Out', cancelled: 'Cancelled' };
      const rows = [];
      d.sessions.forEach(s => {
        const pillLabel = s.status === 'expired' && s.expired_ago
          ? `${statusLabel[s.status]||s.status} · ${escHtml(s.expired_ago)}`
          : (statusLabel[s.status]||s.status);
        const pill = `<span style="background:${statusBg[s.status]||'#F3F4F6'};color:${statusColors[s.status]||'#6B7280'};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">${pillLabel}</span>`;
        const approvedBy = s.approved_by_phone ? `<span style="color:var(--sub);font-size:11px;">${escHtml(s.approved_by_phone)}</span>` : '—';
        const ciStatus = s.checkin_status;
        const ciCell = ciStatus
          ? `<span style="background:${checkinBg[ciStatus]||'#F3F4F6'};color:${checkinColors[ciStatus]||'#6B7280'};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">${checkinLabel[ciStatus]||ciStatus}</span>`
          : '—';
        rows.push(`
          <tr class="hist-row" data-token="${escHtml(s.token)}" style="border-bottom:1px solid #F1F5F9;cursor:pointer;" onclick="toggleHistoryRow(this)">
            <td style="padding:8px 12px;color:var(--muted);font-size:11px;" class="hist-chevron">▶</td>
            <td style="padding:8px 12px;font-weight:500;">${escHtml(s.tenant_name || '—')}</td>
            <td style="padding:8px 12px;">${escHtml(s.room || '—')}</td>
            <td style="padding:8px 12px;">${escHtml(s.tenant_phone || '—')}</td>
            <td style="padding:8px 12px;">₹${Number(s.agreed_rent || 0).toLocaleString('en-IN')}</td>
            <td style="padding:8px 12px;">${pill}</td>
            <td style="padding:8px 12px;">${ciCell}</td>
            <td style="padding:8px 12px;color:var(--muted);">${s.created_at ? formatDateShort(s.created_at) : '—'}</td>
            <td style="padding:8px 12px;">${approvedBy}</td>
          </tr>
          <tr class="hist-detail-row" id="hist-detail-${escHtml(s.token)}" style="display:none;">
            <td colspan="9" style="padding:0;background:#F7FAFC;border-bottom:2px solid #E2E8F0;">
              <div id="hist-detail-inner-${escHtml(s.token)}" style="padding:16px 20px;">
                <div style="color:var(--muted);font-size:12px;">Loading...</div>
              </div>
            </td>
          </tr>`);
      });
      body.innerHTML = rows.join('');
    } catch(e) {}
  }

  // ── Toggle history row expand ──────────────────────────────────────────────
  async function toggleHistoryRow(rowEl) {
    const token = rowEl.dataset.token;
    const detailRow = document.getElementById(`hist-detail-${token}`);
    const chevron = rowEl.querySelector('.hist-chevron');
    const isOpen = detailRow.style.display !== 'none';

    // Collapse all others
    document.querySelectorAll('.hist-detail-row').forEach(r => { r.style.display = 'none'; });
    document.querySelectorAll('.hist-chevron').forEach(c => { c.textContent = '▶'; c.style.color = ''; });
    document.querySelectorAll('.hist-row').forEach(r => { r.style.background = ''; });

    if (isOpen) return; // was open → now closed, done

    detailRow.style.display = '';
    chevron.textContent = '▼';
    chevron.style.color = 'var(--pink)';
    rowEl.style.background = '#FFF5F9';

    const innerEl = document.getElementById(`hist-detail-inner-${token}`);
    if (innerEl.dataset.loaded === '1') return;

    try {
      const res = await fetch(`/api/onboarding/admin/${token}/detail`, { headers: pinHeaders() });
      if (!res.ok) { innerEl.innerHTML = `<div style="color:#E53E3E;font-size:12px;">Failed to load detail.</div>`; return; }
      const data = await res.json();
      innerEl.innerHTML = renderHistoryDetail(data);
      innerEl.dataset.loaded = '1';
    } catch(e) {
      innerEl.innerHTML = `<div style="color:#E53E3E;font-size:12px;">Network error.</div>`;
    }
  }

  // ── Render read-only history detail ───────────────────────────────────────
  function renderHistoryDetail(data) {
    const td = data.tenant_data || {};
    const room = data.room || {};
    const savedFiles = td.saved_files || {};
    const fmtMoney = v => v ? `₹${Number(v).toLocaleString('en-IN')}` : '—';
    const fmtDate = iso => { try { return new Date(iso).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}); } catch { return iso||'—'; } };
    const val = v => `<span style="font-size:13px;font-weight:500;color:#2D3748;">${escHtml(v||'—')}</span>`;
    const field = (label, v) => `<div style="display:flex;flex-direction:column;gap:2px;"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#A0AEC0;">${label}</span>${val(v)}</div>`;

    // Audit bar
    const approvedBy = data.approved_by_name || data.approved_by_phone || '—';
    const createdBy = data.created_by_phone || '—';
    const auditBar = `
      <div style="display:flex;gap:24px;flex-wrap:wrap;padding:10px 14px;background:#EBF8FF;border-radius:8px;margin-bottom:14px;font-size:12px;">
        <div><span style="color:#718096;font-weight:600;">Created by:</span> <span style="color:#2B6CB0;font-weight:700;">${escHtml(createdBy)}</span></div>
        ${data.approved_at ? `<div><span style="color:#718096;font-weight:600;">Approved:</span> <span style="color:#276749;font-weight:700;">${fmtDate(data.approved_at)}</span></div>` : ''}
        ${data.approved_by_phone ? `<div><span style="color:#718096;font-weight:600;">Approved by:</span> <span style="color:#276749;font-weight:700;">${escHtml(approvedBy)}</span></div>` : ''}
        ${data.status === 'expired' ? `<div><span style="color:#c53030;font-weight:700;">Link expired — tenant did not fill the form.</span> Created: ${fmtDate(data.created_at)}</div>` : ''}
        ${data.agreement_pdf_path ? `<div><a href="/static/${escHtml(data.agreement_pdf_path)}" target="_blank" style="color:var(--pink);font-weight:700;text-decoration:none;">View Agreement PDF</a></div>` : ''}
      </div>`;

    // Booking section
    const bookingHtml = `
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#718096;border-bottom:1px solid #E2E8F0;padding-bottom:6px;margin:0 0 10px;">Room &amp; Booking</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px;">
        ${field('Room', (room.number || '—') + (room.building ? ' · '+room.building : ''))}
        ${field('Floor', room.floor)}
        ${field('Sharing', data.sharing_type || room.sharing)}
        ${field('Stay Type', data.stay_type)}
        ${field('Check-in', data.checkin_date ? fmtDate(data.checkin_date) : '—')}
        ${field('Agreed Rent', fmtMoney(data.agreed_rent))}
        ${field('Security Deposit', fmtMoney(data.security_deposit))}
        ${field('Maintenance', fmtMoney(data.maintenance_fee))}
        ${field('Booking Amount', fmtMoney(data.booking_amount))}
        ${data.lock_in_months ? field('Lock-in', data.lock_in_months + ' months') : ''}
        ${data.special_terms ? field('Special Terms', data.special_terms) : ''}
      </div>`;

    // KYC section
    let kycHtml = '';
    if (td.name) {
      kycHtml = `
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#718096;border-bottom:1px solid #E2E8F0;padding-bottom:6px;margin:14px 0 10px;">Tenant Details</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px;">
          ${field('Name', td.name)}
          ${field('Phone', td.phone)}
          ${field('Gender', td.gender)}
          ${field('Date of Birth', td.date_of_birth)}
          ${field('Email', td.email)}
          ${field('Food Preference', td.food_preference)}
          ${field('Occupation', td.occupation)}
          ${field('Education', td.educational_qualification)}
          ${field('ID Type', td.id_proof_type)}
          ${field('ID Number', td.id_proof_number)}
          ${field('Father Name', td.father_name)}
          ${field('Father Phone', td.father_phone)}
          ${field('Emergency Contact', td.emergency_contact_name)}
          ${field('Emergency Phone', td.emergency_contact_phone)}
          ${field('Emergency Relationship', td.emergency_contact_relationship)}
        </div>
        ${td.permanent_address ? `<div style="margin-bottom:14px;">${field('Permanent Address', td.permanent_address)}</div>` : ''}`;
    } else {
      kycHtml = `<div style="color:#A0AEC0;font-size:12px;padding:8px 0;">Tenant did not fill the form.</div>`;
    }

    // Photos
    let photosHtml = '';
    if (savedFiles.selfie || savedFiles.id_proof) {
      photosHtml = `
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#718096;border-bottom:1px solid #E2E8F0;padding-bottom:6px;margin:14px 0 10px;">Documents</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;">`;
      if (savedFiles.selfie) {
        const u = '/media/'+savedFiles.selfie;
        photosHtml += `<div style="text-align:center;cursor:pointer;" onclick="openLightbox('${u}')"><img src="${u}" style="width:72px;height:72px;object-fit:cover;border-radius:50%;border:2px solid #00AEED;"><div style="font-size:10px;color:#718096;margin-top:4px;">Selfie</div></div>`;
      }
      if (savedFiles.id_proof) {
        const u = '/media/'+savedFiles.id_proof;
        if (savedFiles.id_proof.endsWith('.pdf')) {
          photosHtml += `<div style="text-align:center;"><div style="width:72px;height:72px;background:#FEF2F2;border:2px solid #E53E3E;border-radius:8px;display:flex;align-items:center;justify-content:center;"><a href="${u}" target="_blank" style="color:#E53E3E;font-size:11px;font-weight:600;">PDF</a></div><div style="font-size:10px;color:#718096;margin-top:4px;">ID Proof</div></div>`;
        } else {
          photosHtml += `<div style="text-align:center;cursor:pointer;" onclick="openLightbox('${u}')"><img src="${u}" style="width:100px;height:70px;object-fit:cover;border-radius:8px;border:2px solid #00AEED;"><div style="font-size:10px;color:#718096;margin-top:4px;">ID Proof</div></div>`;
        }
      }
      photosHtml += `</div>`;
    }

    // Signature
    let sigHtml = '';
    if (data.signature_image) {
      const src = data.signature_image.startsWith('data:') ? data.signature_image : `data:image/png;base64,${data.signature_image}`;
      sigHtml = `
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#718096;border-bottom:1px solid #E2E8F0;padding-bottom:6px;margin:14px 0 10px;">Signature</div>
        <div style="cursor:pointer;" onclick="openLightbox('${src}')"><img src="${src}" style="max-width:260px;max-height:70px;border:1px solid #E2E8F0;border-radius:6px;padding:4px;background:#fff;"></div>`;
    }

    return auditBar + bookingHtml + kycHtml + photosHtml + sigHtml;
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadPending();
    loadHistory();

    // Default checkin date = today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('checkin_date').value = today;

    // Booking amount change → show/hide payment mode
    document.getElementById('booking_amount').addEventListener('input', onBookingAmountChange);
  });

  // ── Payment mode visibility ────────────────────────────────────────────────
  function onBookingAmountChange() {
    const val = parseFloat(document.getElementById('booking_amount').value) || 0;
    const field = document.getElementById('payment-mode-field');
    if (val > 0) {
      field.style.display = 'flex';
      field.style.flexDirection = 'column';
      field.style.gap = '5px';
    } else {
      field.style.display = 'none';
      // Clear selection
      document.querySelectorAll('input[name="advance_mode"]').forEach(r => r.checked = false);
    }
  }

  // ── Create form submit ─────────────────────────────────────────────────────
  document.getElementById('create-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('create-btn');
    const errEl = document.getElementById('create-error');
    errEl.classList.remove('show');

    const phone = document.getElementById('tenant_phone').value.trim();
    if (!/^\d{10}$/.test(phone)) {
      showAlert(errEl, 'Tenant phone must be exactly 10 digits.');
      return;
    }

    const bookingAmt = parseFloat(document.getElementById('booking_amount').value) || 0;
    if (bookingAmt > 0) {
      const mode = document.querySelector('input[name="advance_mode"]:checked');
      if (!mode) {
        showAlert(errEl, 'Select Cash or UPI for the booking amount.');
        return;
      }
    }

    const payload = {
      room_number: document.getElementById('room_number').value.trim(),
      sharing_type: document.getElementById('sharing_type').value,
      tenant_phone: phone,
      created_by_phone: document.getElementById('created_by_phone').value.trim(),
      agreed_rent: parseFloat(document.getElementById('agreed_rent').value) || 0,
      security_deposit: parseFloat(document.getElementById('security_deposit').value) || 0,
      maintenance_fee: parseFloat(document.getElementById('maintenance_fee').value) || 0,
      booking_amount: bookingAmt,
      advance_mode: bookingAmt > 0 ? (document.querySelector('input[name="advance_mode"]:checked')?.value || '') : '',
      checkin_date: document.getElementById('checkin_date').value,
      stay_type: document.getElementById('stay_type').value,
      lock_in_months: parseInt(document.getElementById('lock_in_months').value) || 0,
      checkout_date: document.getElementById('checkout_date').value || "",
      num_days: parseInt(document.getElementById('num_days').value) || 0,
      daily_rate: parseFloat(document.getElementById('daily_rate').value) || 0,
      special_terms: document.getElementById('special_terms').value.trim(),
    };

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating...';

    try {
      const res = await fetch('/api/onboarding/create', {
        method: 'POST',
        headers: pinHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) {
        showAlert(errEl, data.detail || 'Failed to create session.');
        return;
      }

      // Show result
      const fullLink = data.full_link || (window.location.origin + data.link);
      currentLink = fullLink;
      currentPhone = phone;

      document.getElementById('result-room').textContent = `Room ${data.room?.number || ''} — ${data.room?.building || ''}`;
      document.getElementById('result-link').textContent = fullLink;

      const chips = document.getElementById('result-chips');
      chips.innerHTML = '';
      if (data.warning) chips.innerHTML += `<span class="chip" style="background:#fee2e2;color:#dc2626;font-weight:700;">${data.warning}</span>`;
      if (data.room?.floor) chips.innerHTML += `<span class="chip">Floor ${data.room.floor}</span>`;
      if (data.room?.sharing) chips.innerHTML += `<span class="chip">${data.room.sharing}</span>`;
      if (data.dues_due != null) chips.innerHTML += `<span class="chip" style="background:#FFF5F9;color:var(--pink);font-weight:700;">Due: ₹${Number(data.dues_due).toLocaleString('en-IN')}</span>`;
      if (data.whatsapp_sent) chips.innerHTML += `<span class="chip" style="background:#dcfce7;color:#166534;">WhatsApp sent</span>`;
      else chips.innerHTML += `<span class="chip" style="background:#fef3c7;color:#92400e;">WhatsApp not sent — share link manually</span>`;

      document.getElementById('create-result').classList.add('show');
      document.getElementById('create-form').style.display = 'none';

      // Refresh pending list
      loadPending();

    } catch (err) {
      showAlert(errEl, 'Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create &amp; Generate Link';
    }
  });

  // ── Copy link ──────────────────────────────────────────────────────────────
  function copyLink() {
    if (!currentLink) return;
    navigator.clipboard.writeText(currentLink).then(() => {
      showToast('Link copied!');
    }).catch(() => {
      // Fallback
      const el = document.createElement('textarea');
      el.value = currentLink;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      showToast('Link copied!');
    });
  }

  // ── WhatsApp share ─────────────────────────────────────────────────────────
  function openWhatsApp() {
    if (!currentLink || !currentPhone) return;
    const msg = encodeURIComponent(`Hi! Please fill in your onboarding details here:\n${currentLink}`);
    const wa = `https://wa.me/91${currentPhone}?text=${msg}`;
    window.open(wa, '_blank');
  }

  // ── Stay type toggle ────────────────────────────────────────────────────────
  document.getElementById('stay_type').addEventListener('change', function() {
    const isDaily = this.value === 'daily';
    document.querySelectorAll('.monthly-field').forEach(el => el.style.display = isDaily ? 'none' : '');
    document.querySelectorAll('.daily-field').forEach(el => el.style.display = isDaily ? '' : 'none');
    // Update labels
    if (isDaily) {
      document.querySelector('label[for="agreed_rent"]').textContent = 'Total Amount (₹)';
      document.querySelector('label[for="security_deposit"]').textContent = 'Not applicable';
      document.getElementById('security_deposit').value = 0;
      document.getElementById('security_deposit').closest('.form-group').style.display = 'none';
      document.getElementById('maintenance_fee').closest('.form-group').style.display = 'none';
    } else {
      document.querySelector('label[for="agreed_rent"]').textContent = 'Agreed Rent (₹)';
      document.getElementById('security_deposit').closest('.form-group').style.display = '';
      document.getElementById('maintenance_fee').closest('.form-group').style.display = '';
    }
    updateDues();
  });

  // Auto-calc daily total and num_days
  ['checkout_date', 'num_days', 'daily_rate'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      const checkin = document.getElementById('checkin_date').value;
      const checkout = document.getElementById('checkout_date').value;
      const rate = parseFloat(document.getElementById('daily_rate').value) || 0;
      if (checkin && checkout) {
        const days = Math.max(1, Math.round((new Date(checkout) - new Date(checkin)) / 86400000));
        document.getElementById('num_days').value = days;
        document.getElementById('agreed_rent').value = days * rate;
      } else if (document.getElementById('num_days').value && rate) {
        document.getElementById('agreed_rent').value = parseInt(document.getElementById('num_days').value) * rate;
      }
      updateDues();
    });
  });

  // ── Dues calculator (live) ──────────────────────────────────────────────────
  // Monthly stay: first-month rent defaults to prorata on check-in date
  //   prorated = floor(rent * (days_in_month - checkin.day + 1) / days_in_month)
  // Daily stay: agreed_rent holds the total stay amount — no proration.
  function updateDues() {
    const rent = parseFloat(document.getElementById('agreed_rent').value) || 0;
    const deposit = parseFloat(document.getElementById('security_deposit').value) || 0;
    const booking = parseFloat(document.getElementById('booking_amount').value) || 0;
    const stayType = document.getElementById('stay_type').value;
    const checkinStr = document.getElementById('checkin_date').value;

    let firstMonthRent = rent;
    let prorationNote = '';
    if (stayType === 'monthly' && checkinStr && rent > 0) {
      const checkin = new Date(checkinStr + 'T00:00:00');
      const y = checkin.getFullYear();
      const m = checkin.getMonth();
      const day = checkin.getDate();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const daysBilled = daysInMonth - day + 1;
      firstMonthRent = Math.floor(rent * daysBilled / daysInMonth);
      if (firstMonthRent !== rent) {
        const monthLabel = checkin.toLocaleString('en-IN', { month: 'short' });
        prorationNote = ` <span style="color:var(--muted);font-size:11px;">(prorata: ${daysBilled}/${daysInMonth} days from ${day}-${monthLabel}, monthly rent ₹${rent.toLocaleString('en-IN')})</span>`;
      }
    }

    // Deposit already includes maintenance — don't double count
    const total = firstMonthRent + deposit - booking;
    const fmt = (v) => `₹${v.toLocaleString('en-IN')}`;
    let lines = [];
    if (firstMonthRent) lines.push(`First month rent: ${fmt(firstMonthRent)}${prorationNote}`);
    if (deposit) lines.push(`Security deposit (incl. maintenance): ${fmt(deposit)}`);
    if (booking) lines.push(`Less advance paid: <span style="color:var(--green);">-${fmt(booking)}</span>`);
    document.getElementById('dues-breakdown').innerHTML = lines.join('<br>') || 'Enter amounts above';
    document.getElementById('dues-total').textContent = fmt(Math.max(0, total));
  }
  ['agreed_rent','security_deposit','maintenance_fee','booking_amount','checkin_date','stay_type'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateDues);
    document.getElementById(id).addEventListener('change', updateDues);
  });
  updateDues();

  // ── Room auto-lookup ───────────────────────────────────────────────────────
  let roomLookupTimer = null;
  let roomMasterSharing = '';  // master data sharing for current room

  document.getElementById('room_number').addEventListener('input', function() {
    clearTimeout(roomLookupTimer);
    const val = this.value.trim();
    const infoEl = document.getElementById('room-info');
    const warnEl = document.getElementById('sharing-warning');
    roomMasterSharing = '';
    warnEl.textContent = '';
    if (!val) { infoEl.textContent = ''; return; }
    roomLookupTimer = setTimeout(async () => {
      try {
        const res = await fetch(`/api/onboarding/room-lookup/${encodeURIComponent(val)}`, { headers: pinHeaders() });
        if (res.ok) {
          const d = await res.json();
          infoEl.innerHTML = `<span style="color:var(--green);font-weight:600;">${d.building}</span> · Floor ${d.floor} · <b>${d.sharing}</b>`;
          roomMasterSharing = d.sharing.toLowerCase();
          // Auto-set sharing dropdown
          const sel = document.getElementById('sharing_type');
          if ([...sel.options].some(o => o.value === roomMasterSharing)) sel.value = roomMasterSharing;
          warnEl.textContent = '';
        } else {
          infoEl.innerHTML = `<span style="color:#E53E3E;">Room not found in master data</span>`;
        }
      } catch(e) { infoEl.textContent = ''; }
    }, 400);
  });

  // Warn if sharing override differs from master data
  document.getElementById('sharing_type').addEventListener('change', function() {
    const warnEl = document.getElementById('sharing-warning');
    if (roomMasterSharing && this.value !== roomMasterSharing) {
      warnEl.textContent = `Master data says "${roomMasterSharing}" — you are overriding to "${this.value}"`;
    } else {

    }
  });

  // ── Enter key → next field ─────────────────────────────────────────────────
  // Lokesh fills the form top-to-bottom on a keyboard; Tab works natively but
  // Enter feels more natural after typing a number. Skip submit/textarea/radio
  // so the behavior stays predictable.
  document.getElementById('create-form').addEventListener('keydown', function(e) {
    const isEnter = e.key === 'Enter';
    const isArrowDown = e.key === 'ArrowDown';
    const isArrowRight = e.key === 'ArrowRight';
    const isArrowUp = e.key === 'ArrowUp';
    const isArrowLeft = e.key === 'ArrowLeft';

    if (!(isEnter || isArrowDown || isArrowRight || isArrowUp || isArrowLeft)) return;

    const t = e.target;
    if (t.type === 'radio' || t.type === 'checkbox') return;

    // For textarea: only Up/Down navigate fields; Left/Right edit text
    if (t.tagName === 'TEXTAREA' && (isArrowLeft || isArrowRight)) return;

    // For non-textareas: all arrows navigate
    // For textareas: Up/Down navigate, Left/Right edit (already returned above)
    e.preventDefault();
    const focusables = Array.from(this.querySelectorAll('input, select, textarea, button[type="submit"]'))
      .filter(el => !el.disabled && el.offsetParent !== null && el.type !== 'hidden');
    const idx = focusables.indexOf(t);

    if (idx < 0) return;

    let nextIdx = idx;
    if (isEnter || isArrowDown || isArrowRight) {
      nextIdx = (idx + 1) % focusables.length;
    } else if (isArrowUp || isArrowLeft) {
      nextIdx = (idx - 1 + focusables.length) % focusables.length;
    }

    focusables[nextIdx].focus();
  });

    document.getElementById('create-error').classList.remove('show');

    document.getElementById('checkin_date').value = today;

  // ── Load pending sessions ──────────────────────────────────────────────────
  async function loadPending() {
    const container = document.getElementById('pending-container');
    container.innerHTML = '<div class="loading-state"><span class="spinner"></span> Loading sessions...</div>';

    try {
      const res = await fetch('/api/onboarding/admin/pending', { headers: pinHeaders() });
      const data = await res.json();
      if (!res.ok) {
        container.innerHTML = `<div class="loading-state" style="color:#E53E3E;">Error: ${data.detail || 'Failed to load'}</div>`;
        return;
      }

      const sessions = data.sessions || [];
      document.getElementById('pending-badge').textContent = sessions.length;
      document.getElementById('pending-badge').className = sessions.length > 0 ? 'badge badge-pink' : 'badge badge-gray';

      if (sessions.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">✓</div>
            <p>No pending sessions</p>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="session-list" style="padding:16px;" id="session-list"></div>`;
      const list = document.getElementById('session-list');
      sessions.forEach(s => list.appendChild(buildSessionCard(s)));

    } catch (err) {
      container.innerHTML = '<div class="loading-state" style="color:#E53E3E;">Network error.</div>';
    }
  }

  // ── Build session card ─────────────────────────────────────────────────────
  function buildSessionCard(s) {
    const item = document.createElement('div');
    item.className = 'session-item';
    item.dataset.token = s.token;

    const name = s.tenant_name || 'Pending fill';
    const initial = name !== 'Pending fill' ? name[0].toUpperCase() : '?';
    const statusLabel = s.status === 'pending_review' ? 'Pending Review' : 'Awaiting Tenant';
    const statusClass = s.status === 'pending_review' ? 'status-pending-review' : 'status-pending-tenant';
    const dateStr = s.created_at ? formatDate(s.created_at) : '';

    item.innerHTML = `
      <div class="session-summary" onclick="toggleSession(this)">
        <div class="session-avatar">${initial}</div>
        <div class="session-info">
          <div class="session-name">${escHtml(name)}</div>
          <div class="session-meta">Room ${escHtml(s.room || '—')} · ${escHtml(s.tenant_phone || '')}${s.checkin_date ? ' · Checkin ' + formatDateShort(s.checkin_date) : ''}</div>
        </div>
        <div class="session-right">
          <span class="status-pill ${statusClass}">${statusLabel}</span>
          <span class="session-date">${dateStr}</span>

        <span class="chevron">▼</span>
      </div>

  // ── Toggle session expand ──────────────────────────────────────────────────
  async function toggleSession(summaryEl) {
    const item = summaryEl.closest('.session-item');
    const token = item.dataset.token;
    const isOpen = item.classList.contains('open');

    // Close all others
    document.querySelectorAll('.session-item.open').forEach(el => {
      if (el !== item) el.classList.remove('open');
    });

    item.classList.toggle('open', !isOpen);

    if (!isOpen) {

  // ── Staff signature canvas ─────────────────────────────────────────────────
  const staffSigState = {};  // token -> {drawn: bool}

  function initStaffSigCanvas(token) {
    const canvas = document.getElementById(`staff-sig-${token}`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    // Set pixel dimensions from CSS size
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * (window.devicePixelRatio || 1);
    canvas.height = rect.height * (window.devicePixelRatio || 1);
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    ctx.strokeStyle = '#00AEED';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    staffSigState[token] = { drawn: false };
    let drawing = false, lastX = 0, lastY = 0;

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }
    function start(e) { e.preventDefault(); drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; }
    function draw(e) {
      if (!drawing) return; e.preventDefault();
      const p = getPos(e);
      ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
      lastX = p.x; lastY = p.y;
      staffSigState[token].drawn = true;
    }
    function end() { drawing = false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', end);
  }

  function clearStaffSig(token) {
    const canvas = document.getElementById(`staff-sig-${token}`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (staffSigState[token]) staffSigState[token].drawn = false;
  }

  function getStaffSigDataUrl(token) {
    // If saved-sig checkbox is visible and checked, use stored data URL
    const chk = document.getElementById(`use-saved-sig-${token}`);
    if (chk && chk.checked && staffSigState[token]?.savedUrl) {
      return staffSigState[token].savedUrl;
    }
    const canvas = document.getElementById(`staff-sig-${token}`);
    if (!canvas || !staffSigState[token]?.drawn) return '';
    return canvas.toDataURL('image/png');
  }

  // Called when approver phone is typed — try to load saved signature
  async function onApproverPhoneInput(token, phone) {
    if (phone.length !== 10) return;
    try {
      const r = await fetch(`/api/onboarding/staff-signature/${phone}`, { headers: pinHeaders() });
      if (!r.ok) return;  // no saved sig — keep pad visible
      const data = await r.json();
      if (!data.data_url) return;
      if (!staffSigState[token]) staffSigState[token] = {};
      staffSigState[token].savedUrl = data.data_url;
      // Show saved-sig row, hide pad
      document.getElementById(`saved-sig-preview-${token}`).src = data.data_url;
      document.getElementById(`saved-sig-row-${token}`).style.display = 'flex';
      document.getElementById(`sig-pad-wrap-${token}`).style.display = 'none';
    } catch(e) {}
  }

  // Toggle between saved sig and draw pad
  function onUseSavedSigToggle(token) {
    const chk = document.getElementById(`use-saved-sig-${token}`);
    document.getElementById(`sig-pad-wrap-${token}`).style.display = chk.checked ? 'none' : 'block';
    if (!chk.checked) setTimeout(() => initStaffSigCanvas(token), 50);
  }

  // ── Approve session ────────────────────────────────────────────────────────
  // Walk all editable inputs in this session's detail block, build a
  // {field: value} dict. Only includes non-empty values; backend treats
  // missing keys as "no change".
  function collectOverrides(token) {
    const overrides = {};
    document.querySelectorAll(`[data-token="${token}"][data-field]`).forEach(el => {
      const k = el.dataset.field;
      let v = el.value;
      if (v === undefined || v === null) return;
      v = String(v).trim();
      if (v === '') return;
      // Numbers stay as numbers — backend coerces via Decimal()
      if (el.type === 'number') {
        const n = Number(v);
        if (!isNaN(n)) v = n;
      }
      overrides[k] = v;
    });
    return overrides;
  }

  async function approveSession(token) {
    const errEl = document.getElementById(`err-${token}`);
    const okEl = document.getElementById(`ok-${token}`);
    errEl.classList.remove('show');
    okEl.classList.remove('show');

    // Require staff signature
    const staffSig = getStaffSigDataUrl(token);
    if (!staffSig) {
      showInlineAlert(errEl, 'Please sign as staff before approving.');
      return;
    }

    const btn = event.target;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Approving...';

    const overrides = collectOverrides(token);
    const approverPhoneEl = document.getElementById(`approver-phone-${token}`);
    const approvedByPhone = approverPhoneEl ? approverPhoneEl.value.trim() : '';
    const entrySourceEl = document.querySelector(`input[name="entry-source-${token}"]:checked`);
    const entrySource = entrySourceEl ? entrySourceEl.value : 'onboarding_form';

    try {
      const res = await fetch(`/api/onboarding/${token}/approve`, {
        method: 'POST',
        headers: pinHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ staff_signature: staffSig, approved_by_phone: approvedByPhone, entry_source: entrySource, overrides }),
      });
      // Parse body defensively — 500s may return HTML, not JSON
      let data = {};
      const raw = await res.text();
      try { data = JSON.parse(raw); } catch { data = { detail: raw.slice(0, 300) }; }

      if (!res.ok) {
        const msg = data.detail || data.message || `Server error (${res.status}). Check VPS logs.`;
        showInlineAlert(errEl, `Approval failed: ${msg}`);
        btn.disabled = false;
        btn.innerHTML = 'Approve &amp; Create Tenant';
        return;
      }

      showInlineAlert(okEl, data.message || 'Tenant created successfully!', true);

      // Update card status
      const item = document.querySelector(`.session-item[data-token="${token}"]`);
      if (item) {
        const pill = item.querySelector('.status-pill');
        if (pill) { pill.textContent = 'Approved'; pill.className = 'status-pill'; pill.style.cssText = 'background:#EBF8FF;color:#2B6CB0;border:1px solid #90CDF4;'; }
      }

      // Remove action buttons
      const actions = document.querySelector(`#detail-${token} .detail-actions`);
      if (actions) actions.innerHTML = '<span style="font-size:12px;color:var(--green);font-weight:600;">Approved</span>';

      // Refresh list after short delay
      setTimeout(loadPending, 1500);

    } catch (err) {
      showInlineAlert(errEl, `Network error: ${err && err.message ? err.message : err}. Please try again.`);
      btn.disabled = false;
      btn.innerHTML = 'Approve &amp; Create Tenant';
    }
  }

  // ── Cancel session ─────────────────────────────────────────────────────────
  async function cancelSession(token) {
    if (!confirm('Cancel this onboarding session?')) return;

    const errEl = document.getElementById(`err-${token}`);
    const okEl = document.getElementById(`ok-${token}`);
    errEl.classList.remove('show');

    try {
      const res = await fetch(`/api/onboarding/admin/${token}/cancel`, { method: 'POST', headers: pinHeaders() });
      if (res.ok) {
        showInlineAlert(okEl, 'Session cancelled.', true);
        setTimeout(() => loadPending(), 1000);
        return;
      }
      const d = await res.json();
      const item = document.querySelector(`.session-item[data-token="${token}"]`);
      if (item) item.style.opacity = '.4';
      showInlineAlert(errEl, d.detail || 'Cancel failed', false);
    } catch (err) {
      showInlineAlert(errEl, 'Error.');
    }
  }

  async function resendLink(token) {
    const okEl = document.getElementById(`ok-${token}`);
    const errEl = document.getElementById(`err-${token}`);
    try {
      const res = await fetch(`/api/onboarding/admin/${token}/resend`, { method: 'POST', headers: pinHeaders() });
      if (res.ok) {
        showInlineAlert(okEl, 'WhatsApp link resent!', true);
      } else {
        const d = await res.json();
        showInlineAlert(errEl, d.detail || 'Resend failed', false);
      }
    } catch (err) {
      showInlineAlert(errEl, 'Error resending.');
    }
  }

  async function copySessionLink(token) {
    const baseUrl = window.location.origin;
    const link = `${baseUrl}/onboard/${token}`;
    try {
      await navigator.clipboard.writeText(link);
      alert('✓ Link copied! You can now send it via WhatsApp manually.');
    } catch (err) {
      alert('Failed to copy. Link: ' + link);
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function showAlert(el, msg) {
    el.textContent = msg;
    el.classList.add('show');
  }

  function showInlineAlert(el, msg, isSuccess = false) {
    el.textContent = msg;
    el.className = `inline-alert ${isSuccess ? 'inline-alert-success' : 'inline-alert-error'} show`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return iso; }
  }

  function formatDateShort(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
    } catch { return iso; }
  }

  // ── Toast notification ─────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:#2D3748;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;animation:fadeIn .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.2);`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  // ── Lightbox ──────────────────────────────────────────────────────────────
  function openLightbox(src) {
    const lb = document.createElement('div');
    lb.id = 'lightbox';
    lb.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
    lb.innerHTML = `<img src="${src}" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <div style="position:absolute;top:16px;right:20px;color:#fff;font-size:14px;opacity:0.7;">Press Esc or click to close</div>`;
    lb.onclick = () => lb.remove();
    document.body.appendChild(lb);
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { const lb = document.getElementById('lightbox'); if (lb) lb.remove(); }
  });
</script>

</body>
</html>
